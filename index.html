<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARTIVI DIGITAL - Presentations</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #191919;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }
        .logo {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .logo .yellow { color: #ffc711; }
        .logo .blue { color: #3cc5ee; font-weight: 300; }
        h1 {
            font-size: 18px;
            color: #888;
            margin-bottom: 50px;
            font-weight: 400;
        }
        .presentations {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .card {
            background: #262626;
            border-radius: 12px;
            padding: 25px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #ffc711;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #ffc711;
        }
        .card .client {
            font-size: 14px;
            color: #3cc5ee;
            margin-bottom: 5px;
        }
        .card .date {
            font-size: 12px;
            color: #666;
        }
        .card .type {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="logo"><span class="yellow">MARTIVI</span> <span class="blue">DIGITAL</span></div>
    <h1>Client Presentations</h1>

    <div class="presentations">
        <a href="/thermorum/december-2025.html" class="card">
            <div class="client">Thermorum</div>
            <h3>Social Media Report</h3>
            <div class="date">December 2025</div>
            <div class="type">Meta Ads + Google Ads</div>
        </a>
    </div>
</body>
</html>
