<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>MARTIVI HR — Candidates</title>
<style>
:root{
  --yellow:#ffc711; --cyan:#3cc5ee; --dark:#191919; --bg:#111214; --panel:#1c1e21;
  --panel2:#232629; --line:#2e3236; --text:#e8e8e6; --dim:#9a9f a4;
}
:root{--dim:#9aa0a6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font:15px/1.55 Inter,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--cyan);text-decoration:none}
h1,h2,h3{font-family:Montserrat,Inter,sans-serif}
.wrap{max-width:1180px;margin:0 auto;padding:24px 20px 80px}
/* gate */
#gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
#gate .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:36px;width:340px;text-align:center}
#gate h1{font-size:20px;margin-bottom:4px}
#gate h1 span{color:var(--yellow)}
#gate p{color:var(--dim);font-size:13px;margin-bottom:18px}
#gate input{width:100%;padding:11px 13px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);font-size:15px;margin-bottom:12px;outline:none}
#gate input:focus{border-color:var(--yellow)}
#gate button{width:100%;padding:11px;border:0;border-radius:8px;background:var(--yellow);color:#191919;font-weight:700;font-size:15px;cursor:pointer}
#gate .err{color:#ff7676;font-size:13px;margin-top:10px;display:none}
/* header */
header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px}
header h1{font-size:22px;letter-spacing:.3px}
header h1 b{color:var(--yellow)}
.sub{color:var(--dim);font-size:13px;margin-bottom:20px}
.sub a{margin-left:10px}
/* position tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.tabs a{padding:8px 16px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:13.5px;font-weight:600}
.tabs a.on{background:var(--yellow);border-color:var(--yellow);color:#191919}
.tabs a small{font-weight:400;opacity:.75;margin-left:4px}
.poschip{display:inline-block;font-size:11px;border-radius:4px;padding:1px 6px;background:var(--panel2);border:1px solid var(--line);color:var(--dim);white-space:nowrap}
/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.stat .n{font-size:24px;font-weight:700;font-family:Montserrat}
.stat .l{font-size:12px;color:var(--dim)}
/* controls */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.controls input[type=search]{flex:1;min-width:180px;padding:9px 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--text);outline:none}
.controls select,.btn{padding:9px 12px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:14px;cursor:pointer}
.btn:hover{border-color:var(--yellow)}
.btn.primary{background:var(--yellow);color:#191919;font-weight:700;border-color:var(--yellow)}
/* table */
.tablebox{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:12px}
table{width:100%;border-collapse:collapse;min-width:900px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--panel2)}
.rank{color:var(--dim);font-size:13px;width:30px}
.cname{font-weight:600;white-space:nowrap}
.cname .ka{display:block;font-weight:400;font-size:12px;color:var(--dim)}
.scorebar{display:flex;align-items:center;gap:8px;min-width:120px}
.scorebar .bar{height:6px;border-radius:3px;background:var(--line);width:80px;overflow:hidden}
.scorebar .bar i{display:block;height:100%;border-radius:3px}
.scorebar b{font-size:14px}
.tag{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:1px 9px;font-size:12px;margin:1px 2px 1px 0;white-space:nowrap}
.tag.hot{border-color:var(--yellow);color:var(--yellow)}
select.status{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:6px;padding:4px 6px;font-size:12.5px;cursor:pointer}
.st-New{color:#c8cdd2}.st-Shortlist{color:var(--yellow)}.st-Interview{color:var(--cyan)}.st-Offer{color:#7ee787}.st-Rejected{color:#ff7676}
.small{font-size:12.5px;color:var(--dim);white-space:nowrap}
/* compare bar */
#cmpbar{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:2px solid var(--yellow);padding:12px 20px;display:none;z-index:20}
#cmpbar .in{max-width:1180px;margin:0 auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
/* detail */
.back{display:inline-block;margin-bottom:16px;color:var(--dim)}
.back:hover{color:var(--yellow)}
.dhead{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:flex-start;margin-bottom:6px}
.dhead h2{font-size:26px}
.dhead .ka{color:var(--dim);font-weight:400;font-size:15px}
.badge{font-family:Montserrat;font-weight:800;font-size:30px;color:var(--yellow)}
.badge small{font-size:13px;color:var(--dim);font-weight:400}
.role{color:var(--cyan);margin-bottom:14px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 22px}
.actions a{display:inline-block;padding:9px 14px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-size:14px}
.actions a:hover{border-color:var(--yellow)}
.actions a.main{background:var(--yellow);border-color:var(--yellow);color:#191919;font-weight:700}
.actions a.warn:hover{border-color:#ff7676;color:#ff7676}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
.panel h3{font-size:13px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:12px}
.panel ul{list-style:none}
.panel li{padding:4px 0 4px 22px;position:relative;font-size:14px}
li.plus:before{content:'+';position:absolute;left:4px;color:#7ee787;font-weight:700}
li.minus:before{content:'!';position:absolute;left:6px;color:#ffb35c;font-weight:700}
.dim{color:var(--dim)}
.sbrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13.5px}
.sbrow .lbl{width:120px;color:var(--dim)}
.sbrow .bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.sbrow .bar i{display:block;height:100%;border-radius:4px;background:var(--cyan)}
.sbrow b{width:26px;text-align:right}
.mailquote{white-space:pre-wrap;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px;font-size:13.5px;color:#c8cdd2;max-height:260px;overflow-y:auto}
textarea.notes{width:100%;min-height:90px;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px;font:13.5px Inter,sans-serif;resize:vertical}
.ainote{border-left:3px solid var(--yellow);padding:10px 14px;background:var(--panel2);border-radius:0 8px 8px 0;font-size:14px}
/* compare view */
.cmpgrid{display:grid;gap:14px}
.cmpcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.cmpcard h3{margin-bottom:2px}
footer{margin-top:40px;color:#5b6167;font-size:12px;text-align:center}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <h1>MARTIVI <span>HR</span></h1>
    <p>Candidate dashboard is protected.<br>Enter the access password.</p>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button id="unlock">Unlock</button>
    <div class="err" id="gerr">Wrong password, try again.</div>
  </div>
</div>
<div class="wrap" id="app" style="display:none"></div>

let DB = window.PLAINDB || null;
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function tryDecrypt(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:b64(ENC.salt), iterations:200000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(ENC.iv)}, key, b64(ENC.data));
  return JSON.parse(new TextDecoder().decode(plain));
}
async function unlock(pw, save){
  try{
    DB = await tryDecrypt(pw);
    if(save) localStorage.setItem('hrdash.pw', pw);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='block';
    route();
  }catch(e){
    localStorage.removeItem('hrdash.pw');
    document.getElementById('gerr').style.display='block';
  }
}
if(ENC === null){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  window.addEventListener('DOMContentLoaded', route);
} else {
  document.getElementById('unlock').onclick = () => unlock(document.getElementById('pw').value, true);
  document.getElementById('pw').addEventListener('keydown', e => {if(e.key==='Enter') unlock(e.target.value, true)});
  const savedPw = localStorage.getItem('hrdash.pw');
  if(savedPw) unlock(savedPw, false);
}

/* ---------- state ---------- */
const STATUSES = ['New','Shortlist','Interview','Offer','Rejected'];
let activePos = localStorage.getItem('hrdash.pos') || 'all';
const posTitle = slug => (DB.positions && DB.positions[slug] && DB.positions[slug].title) || slug || '?';
const getStatus = id => localStorage.getItem('hrdash.status.'+id) || 'New';
const setStatus = (id,v) => localStorage.setItem('hrdash.status.'+id, v);
const getNotes = id => localStorage.getItem('hrdash.notes.'+id) || '';
let cmp = new Set();
let sortKey = 'overall', sortDir = -1, q = '', statusFilter = '';

const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const scoreColor = v => v>=7.5 ? 'var(--yellow)' : v>=6 ? 'var(--cyan)' : v>=4.5 ? '#8a9199' : '#5b6167';
const fmtDate = iso => new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
const engLevel = c => {const m=(c.languages||'').match(/English\s*\(?([^,)]*)/i); return m?m[1].trim():'—'};

function mailto(c, tpl){
  const pos = DB.positions && DB.positions[c.position];
  const t = pos && pos.templates && pos.templates[tpl];
  if(!t) return `mailto:${c.email}`;
  const first = (c.nameKa || c.name).split(' ')[0];
  return `mailto:${c.email}?subject=${encodeURIComponent(t.subject)}&body=${encodeURIComponent(t.body.replaceAll('[NAME]', first))}`;
}

/* ---------- routing ---------- */
window.addEventListener('hashchange', route);
function route(){
  if(!DB) return;
  const h = location.hash;
  const app = document.getElementById('app');
  let m;
  if(m = h.match(/^#\/c\/(.+)$/)) app.innerHTML = renderDetail(decodeURIComponent(m[1]));
  else if(h === '#/compare') app.innerHTML = renderCompare();
  else app.innerHTML = renderList();
  bind();
  window.scrollTo(0,0);
}

/* ---------- list ---------- */
function visibleCands(){
  let cs = [...DB.candidates];
  if(activePos !== 'all') cs = cs.filter(c => c.position === activePos);
  if(q){const s=q.toLowerCase(); cs = cs.filter(c => (c.name+' '+c.nameKa+' '+c.email+' '+(c.tools||[]).join(' ')+' '+c.education).toLowerCase().includes(s));}
  if(statusFilter) cs = cs.filter(c => getStatus(c.id) === statusFilter);
  cs.sort((a,b) => {
    let va, vb;
    if(sortKey==='overall'){va=a.overall; vb=b.overall}
    else if(sortKey==='appliedAt'){va=a.appliedAt; vb=b.appliedAt}
    else {va=a.name; vb=b.name}
    return (va<vb?-1:va>vb?1:0)*sortDir;
  });
  return cs;
}

function renderList(){
  const cs = visibleCands();
  const all = activePos === 'all' ? DB.candidates : DB.candidates.filter(c => c.position === activePos);
  const shortlisted = all.filter(c => ['Shortlist','Interview','Offer'].includes(getStatus(c.id))).length;
  const avg = all.length ? (all.reduce((s,c)=>s+c.overall,0)/all.length).toFixed(1) : '—';
  const posSlugs = Object.keys(DB.positions || {});
  const tabs = `<div class="tabs">
    <a href="#" data-pos="all" class="${activePos==='all'?'on':''}">All<small>${DB.candidates.length}</small></a>
    ${posSlugs.map(s=>`<a href="#" data-pos="${s}" class="${activePos===s?'on':''}">${esc(posTitle(s))}<small>${DB.candidates.filter(c=>c.position===s).length}</small></a>`).join('')}
  </div>`;
  const rows = cs.map((c,i) => `
    <tr data-go="${c.id}">
      <td class="rank">${i+1}</td>
      <td><input type="checkbox" data-cmp="${c.id}" ${cmp.has(c.id)?'checked':''}></td>
      <td class="cname">${esc(c.name)}<span class="ka">${esc(c.nameKa)}${activePos==='all'?` · <span class="poschip">${esc(posTitle(c.position))}</span>`:''}</span></td>
      <td><div class="scorebar"><div class="bar"><i style="width:${c.overall*10}%;background:${scoreColor(c.overall)}"></i></div><b>${c.overall}</b></div></td>
      <td class="small">${esc(c.currentRole).slice(0,46)}${c.currentRole.length>46?'…':''}</td>
      <td>${(c.tools||[]).slice(0,3).map(t=>`<span class="tag${/clickup/i.test(t)?' hot':''}">${esc(t)}</span>`).join('')}${(c.tools||[]).length>3?`<span class="small"> +${c.tools.length-3}</span>`:''}</td>
      <td class="small">${esc(engLevel(c))}</td>
      <td class="small">${fmtDate(c.appliedAt)}</td>
      <td><select class="status st-${getStatus(c.id)}" data-status="${c.id}">${STATUSES.map(s=>`<option ${s===getStatus(c.id)?'selected':''}>${s}</option>`).join('')}</select></td>
    </tr>`).join('');
  return `
  <header><h1><b>MARTIVI</b> HR</h1><span class="dim">${activePos==='all'?'All positions':esc(posTitle(activePos))}</span></header>
  <div class="sub">${all.length} candidates · updated ${new Date(DB.updatedAt).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
    <a href="${DB.driveFolder}" target="_blank">CV folder (Drive) ↗</a>
    <a href="#" id="csv">Export CSV</a>
  </div>
  ${tabs}
  <div class="stats">
    <div class="stat"><div class="n">${all.length}</div><div class="l">Applications</div></div>
    <div class="stat"><div class="n" style="color:var(--yellow)">${shortlisted}</div><div class="l">In pipeline</div></div>
    <div class="stat"><div class="n">${avg}</div><div class="l">Average score</div></div>
    <div class="stat"><div class="n" style="color:var(--cyan)">${all.filter(c=>c.overall>=7).length}</div><div class="l">Scored 7+</div></div>
  </div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search name, tool, school…" value="${esc(q)}">
    <select id="sf"><option value="">All statuses</option>${STATUSES.map(s=>`<option ${s===statusFilter?'selected':''}>${s}</option>`).join('')}</select>
    <select id="sort">
      <option value="overall" ${sortKey==='overall'?'selected':''}>Sort: score</option>
      <option value="appliedAt" ${sortKey==='appliedAt'?'selected':''}>Sort: date</option>
      <option value="name" ${sortKey==='name'?'selected':''}>Sort: name</option>
    </select>
  </div>
  <div class="tablebox"><table>
    <thead><tr><th>#</th><th title="compare">⇄</th><th>Candidate</th><th>Score</th><th>Current</th><th>Tools</th><th>English</th><th>Applied</th><th>Status</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <footer>MARTIVI CONSULTING · internal use only · scores are AI-assisted estimates, verify at interview</footer>`;
}

/* ---------- detail ---------- */
function renderDetail(id){
  const c = DB.candidates.find(x => x.id === id);
  if(!c) return '<p>Not found. <a href="#/">Back</a></p>';
  const dims = [['experience','Experience'],['tools','Tools & tech'],['communication','Communication'],['organization','Organization'],['motivation','Motivation']];
  return `
  <a class="back" href="#/">&larr; All candidates</a>
  <div class="dhead">
    <div><h2>${esc(c.name)} <span class="ka">${esc(c.nameKa)}</span></h2><div class="role">${esc(c.currentRole)} · <span class="poschip">${esc(posTitle(c.position))}</span></div></div>
    <div class="badge">${c.overall}<small> /10</small></div>
  </div>
  <div class="actions">
    <a class="main" href="${mailto(c,'invite')}">Invite to interview</a>
    <a href="mailto:${c.email}">Email</a>
    <a href="tel:${c.phone.replace(/[^+\d]/g,'')}">Call ${esc(c.phone)}</a>
    ${c.cvLinks.map(l=>`<a href="${l.url}" target="_blank">${esc(l.label)} ↗</a>`).join('')}
    <a class="warn" href="${mailto(c,'reject')}">Send rejection</a>
    <select class="status st-${getStatus(c.id)}" data-status="${c.id}" style="padding:9px">${STATUSES.map(s=>`<option ${s===getStatus(c.id)?'selected':''}>${s}</option>`).join('')}</select>
  </div>
  <div class="grid2">
    <div>
      <div class="panel"><h3>Score breakdown</h3>
        ${dims.map(([k,l])=>`<div class="sbrow"><span class="lbl">${l}</span><div class="bar"><i style="width:${c.scores[k]*10}%"></i></div><b>${c.scores[k]}</b></div>`).join('')}
        <div class="small dim" style="margin-top:8px">weights: exp 30% · tools 25% · comm 20% · org 15% · motiv 10%</div>
      </div>
      <div class="panel"><h3>Strengths</h3><ul>${c.highlights.map(h=>`<li class="plus">${esc(h)}</li>`).join('')}</ul></div>
      <div class="panel"><h3>Watch out</h3><ul>${c.concerns.map(h=>`<li class="minus">${esc(h)}</li>`).join('')}</ul></div>
      <div class="panel"><h3>MAIA fit</h3><div class="ainote">${esc(c.aiNote)}</div></div>
    </div>
    <div>
      <div class="panel"><h3>Profile</h3>
        <p style="margin-bottom:10px">${esc(c.experience)}</p>
        <p class="small"><b>Education:</b> ${esc(c.education)}</p>
        <p class="small"><b>Languages:</b> ${esc(c.languages)}</p>
        <p class="small"><b>Contact:</b> ${esc(c.email)} · ${esc(c.phone)}</p>
        <p class="small"><b>Applied:</b> ${new Date(c.appliedAt).toLocaleString('en-GB')}</p>
        <div style="margin-top:8px">${(c.tools||[]).map(t=>`<span class="tag${/clickup/i.test(t)?' hot':''}">${esc(t)}</span>`).join('')}</div>
      </div>
      <div class="panel"><h3>Application email</h3><div class="mailquote">${esc(c.emailBody||'(no text, attachments only)')}</div></div>
      <div class="panel"><h3>Your notes</h3><textarea class="notes" data-notes="${c.id}" placeholder="Interview impressions, salary talk, availability…">${esc(getNotes(c.id))}</textarea><div class="small dim" style="margin-top:6px">saved automatically in this browser</div></div>
    </div>
  </div>`;
}

/* ---------- compare ---------- */
function renderCompare(){
  const cs = DB.candidates.filter(c => cmp.has(c.id));
  if(!cs.length) return '<a class="back" href="#/">&larr; All candidates</a><p class="dim">Nothing selected for comparison.</p>';
  const dims = [['experience','Experience'],['tools','Tools & tech'],['communication','Communication'],['organization','Organization'],['motivation','Motivation']];
  return `
  <a class="back" href="#/">&larr; All candidates</a>
  <h2 style="margin-bottom:16px">Side by side</h2>
  <div class="cmpgrid" style="grid-template-columns:repeat(${cs.length},1fr)">
    ${cs.map(c=>`<div class="cmpcard">
      <h3><a href="#/c/${c.id}">${esc(c.name)}</a></h3>
      <div class="badge" style="font-size:22px">${c.overall}<small> /10</small></div>
      <div style="margin:10px 0">${dims.map(([k,l])=>`<div class="sbrow"><span class="lbl" style="width:90px;font-size:12px">${l}</span><div class="bar"><i style="width:${c.scores[k]*10}%"></i></div><b style="font-size:12px">${c.scores[k]}</b></div>`).join('')}</div>
      <p class="small"><b>Now:</b> ${esc(c.currentRole)}</p>
      <p class="small"><b>English:</b> ${esc(engLevel(c))}</p>
      <p class="small"><b>Tools:</b> ${(c.tools||[]).join(', ')||'—'}</p>
      <p class="small" style="margin-top:6px;color:#7ee787">+ ${esc(c.highlights[0]||'')}</p>
      <p class="small" style="color:#ffb35c">! ${esc(c.concerns[0]||'')}</p>
      <div class="actions" style="margin:12px 0 0"><a class="main" style="font-size:12.5px;padding:7px 10px" href="${mailto(c,'invite')}">Invite</a></div>
    </div>`).join('')}
  </div>`;
}

/* ---------- events ---------- */
function bind(){
  document.querySelectorAll('[data-pos]').forEach(el => el.addEventListener('click', e => {
    e.preventDefault();
    activePos = el.dataset.pos;
    localStorage.setItem('hrdash.pos', activePos);
    route();
  }));
  document.querySelectorAll('[data-go]').forEach(tr => tr.addEventListener('click', e => {
    if(e.target.closest('select,input,a')) return;
    location.hash = '#/c/' + tr.dataset.go;
  }));
  document.querySelectorAll('[data-status]').forEach(el => el.addEventListener('change', () => {
    setStatus(el.dataset.status, el.value);
    el.className = el.className.replace(/st-\w+/, 'st-'+el.value);
  }));
  document.querySelectorAll('[data-cmp]').forEach(el => el.addEventListener('change', () => {
    el.checked ? cmp.add(el.dataset.cmp) : cmp.delete(el.dataset.cmp);
    if(cmp.size > 3){el.checked = false; cmp.delete(el.dataset.cmp);}
    updateCmpBar();
  }));
  document.querySelectorAll('[data-notes]').forEach(el => el.addEventListener('input', () =>
    localStorage.setItem('hrdash.notes.'+el.dataset.notes, el.value)));
  const qEl = document.getElementById('q');
  if(qEl) qEl.addEventListener('input', () => {q = qEl.value; refreshListOnly();});
  const sf = document.getElementById('sf');
  if(sf) sf.addEventListener('change', () => {statusFilter = sf.value; refreshListOnly();});
  const so = document.getElementById('sort');
  if(so) so.addEventListener('change', () => {sortKey = so.value; sortDir = sortKey==='name'?1:-1; refreshListOnly();});
  const csv = document.getElementById('csv');
  if(csv) csv.addEventListener('click', e => {e.preventDefault(); exportCsv();});
  updateCmpBar();
}
function refreshListOnly(){
  if(location.hash && location.hash !== '#/' && location.hash !== '') return;
  const app = document.getElementById('app');
  const qEl = document.getElementById('q'); const pos = qEl ? qEl.selectionStart : 0;
  app.innerHTML = renderList(); bind();
  const q2 = document.getElementById('q'); if(q2){q2.focus(); q2.setSelectionRange(pos,pos);}
}
function updateCmpBar(){
  let bar = document.getElementById('cmpbar');
  if(!bar){bar = document.createElement('div'); bar.id='cmpbar'; document.body.appendChild(bar);}
  if(cmp.size >= 2 && !location.hash.startsWith('#/c')){
    const names = DB.candidates.filter(c=>cmp.has(c.id)).map(c=>c.name.split(' ')[0]).join(' vs ');
    bar.innerHTML = `<div class="in"><b>${names}</b><a class="btn primary" href="#/compare">Compare</a><a class="btn" href="#" id="clearcmp">Clear</a></div>`;
    bar.style.display='block';
    document.getElementById('clearcmp').onclick = e => {e.preventDefault(); cmp.clear(); route();};
  } else bar.style.display='none';
}
function exportCsv(){
  const head = ['Name','Position','Email','Phone','Score','Status','Current role','English','Tools','Applied','CV'];
  const lines = [head.join(',')].concat(DB.candidates.map(c => [
    c.name, posTitle(c.position), c.email, c.phone, c.overall, getStatus(c.id), c.currentRole.replace(/,/g,';'),
    engLevel(c), (c.tools||[]).join('; '), c.appliedAt.slice(0,10), (c.cvLinks[0]||{}).url||''
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')));
  const blob = new Blob(['﻿'+lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'candidates.csv'; a.click();
}
</script>
</body>
</html>
